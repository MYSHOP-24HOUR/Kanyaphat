<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>แอพพรีเมี่ยม</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== Background ===== */
body{
  margin:0;
  background:linear-gradient(
    180deg,
    #f48a90 0%,
    #f6a86f 50%,
    #f3d28f 100%
  );
  font-family:'Kanit', sans-serif;
  text-align:center;
}

/* glow light */
body::before{
  content:"";
  position:fixed;
  width:340px;
  height:340px;
  background:#ffd1a8;
  filter:blur(150px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

.container{
  max-width:400px;
  margin:auto;
  padding:30px 20px;
}

/* ===== Title ===== */
h1{
  color:white;
  font-family:'Mali', cursive;
  text-shadow:0 3px 12px rgba(0,0,0,.2);
}

h3{
  font-family:'Mali', cursive;
  color:#c94a4f;
}

/* ===== Product Card ===== */
.product-card{
  background:rgba(255,255,255,0.9);
  border-radius:22px;
  padding:15px;
  margin-bottom:22px;
  backdrop-filter:blur(10px);
  cursor:pointer;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.12),
    inset 0 1px 1px rgba(255,255,255,0.7);

  transition:.25s;
}

.product-card:hover{
  transform:translateY(-4px);
}

/* image */
.product-img{
  width:100%;
  border-radius:15px;
  object-fit:cover;
}

.desc{
  margin-top:10px;
  color:#444;
}

/* ===== Button ===== */
.button{
  display:block;
  margin-top:30px;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,0.9);
  text-decoration:none;
  color:#c94a4f;
  font-weight:500;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.12),
    inset 0 1px 1px rgba(255,255,255,0.8);

  transition:.25s;
}

.button:hover{
  transform:translateY(-3px);
  background:#ffffff;
}

.button:active{
  transform:scale(0.96);
}

</style>
</head>

<body>

<div class="container">

<!-- ===== Page Title ===== -->
<h1>แอพพรีเมี่ยม</h1>

<!-- ===== PRODUCT ===== -->
<div class="product-card">
  <img class="product-img" src="IMG_1865.jpeg" alt="Netflix" loading="lazy">
  <h3>Netflix</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1866.jpeg" alt="WeTV" loading="lazy">
  <h3>WeTV</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1867.jpeg" alt="IQIYI UID" loading="lazy">
  <h3>IQIYI</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1868.jpeg" alt="YouTube Premium" loading="lazy">
  <h3>YouTube premium</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1869.jpeg" alt="YOUKU" loading="lazy">
  <h3>YOUKU</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1870.jpeg" alt="BiliBili" loading="lazy">
  <h3>BiliBili</h3>
</div>

<div class="product-card">
  <img class="product-img" src="IMG_1871.jpeg" alt="ch plus" loading="lazy">
  <h3>ch+</h3>
</div>

<!-- ปุ่มกลับ -->
<a class="button" href="index.html">⬅ กลับหน้าหลัก</a>

</div>

</body>
</html>
