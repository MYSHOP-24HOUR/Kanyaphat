<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moowan shop</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== Animation ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== Background (PASTEL BRIGHT) ===== */
body{
  margin:0;
  background:linear-gradient(
    180deg,
    #f48a90 0%,
    #f6a86f 50%,
    #f3d28f 100%
  );
  font-family:'Kanit',sans-serif;
  text-align:center;
  animation:fadeUp .7s ease;
}

/* Glow light */
body::before{
  content:"";
  position:fixed;
  width:340px;
  height:340px;
  background:#ffd1a8;
  filter:blur(150px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

/* ===== Font ===== */
h1,h2,.navbar{
  font-family:'Mali',cursive;
}

/* ===== Navbar ===== */
.navbar{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(15px);
  padding:15px;
  font-weight:600;
  color:#c94a4f;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}

/* ===== Container ===== */
.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

/* ===== Logo ===== */
.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.18);
}

/* ===== Title ===== */
h1{
  color:#ffffff;
  text-shadow:0 3px 12px rgba(0,0,0,.18);
}

/* ===== Button ===== */
.button{
  display:block;
  margin:14px 0;
  padding:16px;
  border-radius:22px;
  text-decoration:none;
  color:#c94a4f;
  font-weight:500;

  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);

  box-shadow:
    0 5px 14px rgba(0,0,0,0.12),
    inset 0 1px 1px rgba(255,255,255,0.8);

  transition:.25s;
}

.button:hover{
  transform:translateY(-4px);
  background:#ffffff;
}

/* ===== Footer ===== */
.footer{
  margin-top:45px;
  padding:28px;
  font-size:14px;
  color:#c94a4f;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(12px);
  border-radius:30px 30px 0 0;
}

</style>
</head>

<body>

<div class="navbar">
Moowan shop
</div>

<div class="container">

<img class="logo" src="IMG_1860.jpeg">

<h1>choose to buy</h1>

<a class="button" href="product1.html">เติมเกมต่างๆ</a>
<a class="button" href="product2.html">แอพพรีเมี่ยม</a>
<a class="button" href="product3.html">สติ้กเกอร์ไลน์</a>
  
<a class="button" href="https://www.instagram.com/n.nt1u_vz?igsh=MWxrdjc4emVjNzdpMg%3D%3D&utm_source=qr">Instagram</a>
<a class="button" href="https://www.facebook.com/milin.mx.2024?">Facebook</a>
<a class="button" href="https://lin.ee/9Tw7bne">LINE</a>

<div class="footer">
Moowan shop <br>
ยินดีให้บริการ
</div>

</div>

</body>
</html>
